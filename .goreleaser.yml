project_name: speed

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: speed
    main: .
    binary: speed
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    builds:
      - speed
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

release:
  github:
    owner: linuswolff
    name: speed
